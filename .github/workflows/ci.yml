name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Node ${{ matrix.node }} - Windows
    runs-on: windows-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run fmt:check

      - name: Run tests
        run: npm test

      - name: Build native addon
        run: npm run build

  prebuild:
    name: Prebuild for ${{ matrix.arch }}
    runs-on: windows-latest
    needs: test
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build prebuilds
        run: npm run prebuild -- --arch ${{ matrix.arch }}

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 7

  release:
    name: Publish Release
    runs-on: windows-latest
    needs: prebuild
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Download x64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: prebuilds-x64
          path: prebuilds/

      - name: Download arm64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: prebuilds-arm64
          path: prebuilds/

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
